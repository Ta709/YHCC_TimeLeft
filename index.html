<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHCC TO THE ENDS!</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --text-color: #ffffff;
            --accent-color: #ff3e3e;
            --card-bg: #16161a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            max-width: 800px;
            z-index: 1;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffffff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #888;
            margin-bottom: 40px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .countdown {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .time-box {
            background: var(--card-bg);
            border: 1px solid #2a2a30;
            border-radius: 12px;
            padding: 25px;
            min-width: 140px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .time-box:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .number {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text-color);
            line-height: 1;
            margin-bottom: 5px;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* Background glow effect */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .subtitle { font-size: 1.1rem; }
            .time-box { min-width: 100px; padding: 15px; }
            .number { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <h1>YHCC TO THE ENDS!</h1>
        <div class="subtitle">Counting down to December 21</div>

        <div class="countdown">
            <div class="time-box">
                <div class="number" id="days">00</div>
                <div class="label">Days</div>
            </div>
            <div class="time-box">
                <div class="number" id="hours">00</div>
                <div class="label">Hours</div>
            </div>
            <div class="time-box">
                <div class="number" id="minutes">00</div>
                <div class="label">Minutes</div>
            </div>
            <div class="time-box">
                <div class="number" id="seconds">00</div>
                <div class="label">Seconds</div>
            </div>
        </div>
    </div>

    <script>
        function updateCountdown() {
            const now = new Date();
            const currentYear = now.getFullYear();
            
            // Set target to Dec 21 of the current year
            let targetDate = new Date(`December 21, ${currentYear} 00:00:00`);
            
            // If Dec 21 has already passed this year, count to next year's Dec 21
            if (now > targetDate) {
                targetDate = new Date(`December 21, ${currentYear + 1} 00:00:00`);
            }

            const difference = targetDate - now;

            // Time calculations
            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            // Add leading zeros if numbers are less than 10
            document.getElementById('days').innerText = d < 10 ? '0' + d : d;
            document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
            document.getElementById('minutes').innerText = m < 10 ? '0' + m : m;
            document.getElementById('seconds').innerText = s < 10 ? '0' + s : s;
        }

        // Run immediately on load, then update every second
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
